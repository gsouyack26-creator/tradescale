<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#1a1a2e" />
<title>TradeScale — Track Top Traders</title>
<style>
:root {
  --bg-primary: #0f0f1a;
  --bg-secondary: #1a1a2e;
  --bg-card: #16213e;
  --accent-green: #00d4aa;
  --accent-red: #ff4757;
  --accent-blue: #4a90d9;
  --accent-gold: #ffd700;
  --text-primary: #e8e8e8;
  --text-secondary: #a0a0b0;
  --text-muted: #6b6b80;
  --border: #2a2a4a;
  --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}
.app { max-width: 1200px; margin: 0 auto; padding: 16px; }
.header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; border-bottom: 1px solid var(--border);
  margin-bottom: 24px; flex-wrap: wrap; gap: 12px;
}
.header h1 {
  font-size: 1.8rem;
  background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header .budget-input {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg-card); padding: 8px 16px;
  border-radius: var(--radius); border: 1px solid var(--border);
}
.header .budget-input label { color: var(--text-secondary); font-size: 0.85rem; }
.header .budget-input input {
  background: transparent; border: none; color: var(--accent-gold);
  font-size: 1.1rem; font-weight: 700; width: 100px; outline: none;
}
.tabs { display: flex; gap: 4px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 4px; }
.tab {
  padding: 10px 20px; border-radius: 8px; background: var(--bg-secondary);
  border: 1px solid var(--border); color: var(--text-secondary);
  cursor: pointer; font-size: 0.85rem; font-weight: 500;
  white-space: nowrap; transition: all 0.2s;
}
.tab:hover { border-color: var(--accent-blue); color: var(--text-primary); }
.tab.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
.card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 16px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--accent-blue); }
.card-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 12px; flex-wrap: wrap; gap: 8px;
}
.trader-name { font-weight: 700; font-size: 1.1rem; }
.trader-meta { color: var(--text-secondary); font-size: 0.8rem; }
.trade-action {
  padding: 4px 12px; border-radius: 20px; font-size: 0.75rem;
  font-weight: 700; text-transform: uppercase;
}
.trade-action.buy { background: rgba(0,212,170,0.15); color: var(--accent-green); }
.trade-action.sell { background: rgba(255,71,87,0.15); color: var(--accent-red); }
.trade-details {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px; margin: 16px 0;
}
.detail-item { background: var(--bg-secondary); padding: 12px; border-radius: 8px; }
.detail-label { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
.detail-value { font-size: 1rem; font-weight: 600; margin-top: 4px; }
.detail-value.green { color: var(--accent-green); }
.detail-value.gold { color: var(--accent-gold); }
.detail-value.blue { color: var(--accent-blue); }
.scaled-section {
  background: rgba(0,212,170,0.05); border: 1px dashed var(--accent-green);
  border-radius: 8px; padding: 16px; margin-top: 12px;
}
.scaled-section h4 { color: var(--accent-green); font-size: 0.85rem; margin-bottom: 8px; }
.scaled-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; }
.scaled-item { font-size: 0.85rem; }
.scaled-item span { color: var(--text-muted); display: block; font-size: 0.7rem; }
.strat-toggle-btn {
  background: transparent; border: 1px solid #2a2a4a; color: var(--accent-gold);
  padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 0.8rem;
}
.strat-item { padding: 8px 12px; background: var(--bg-secondary); border-radius: 6px; margin-bottom: 6px; }
.strat-item-row { display: flex; justify-content: space-between; align-items: center; }
.strat-item p { color: var(--text-secondary); font-size: 0.8rem; margin-top: 4px; }
.strategy-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; margin-bottom: 16px;
}
.strategy-card h3 { color: var(--accent-gold); margin-bottom: 8px; }
.strategy-card .risk-badge {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 0.7rem; font-weight: 600; margin-bottom: 12px;
}
.risk-low { background: rgba(0,212,170,0.15); color: var(--accent-green); }
.risk-med, .risk-medium { background: rgba(255,215,0,0.15); color: var(--accent-gold); }
.risk-high { background: rgba(255,71,87,0.15); color: var(--accent-red); }
.strategy-card p { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 8px; }
.strategy-card ul { padding-left: 20px; color: var(--text-secondary); font-size: 0.85rem; }
.strategy-card li { margin-bottom: 4px; }
.source-row {
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
}
.badge-free { background: rgba(0,212,170,0.15); color: var(--accent-green); }
.badge-paid { background: rgba(255,71,87,0.15); color: var(--accent-red); }
.badge-pill { padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; }
.intro-text { color: var(--text-secondary); margin-bottom: 16px; font-size: 0.85rem; }
@media (max-width: 600px) {
  .header h1 { font-size: 1.4rem; }
  .trade-details { grid-template-columns: 1fr 1fr; }
  .card { padding: 16px; }
}
</style>
</head>
<body>
<div id="root"></div>

<script>
"use strict";

// ============ DATA ============
var topTraders = [
  { id: 1, name: "Warren Buffett", fund: "Berkshire Hathaway", portfolioSize: 350000000000, style: "Value Investing", source: "SEC 13F Filing" },
  { id: 2, name: "Bill Ackman", fund: "Pershing Square", portfolioSize: 12000000000, style: "Activist Value", source: "SEC 13F Filing" },
  { id: 3, name: "Nancy Pelosi", fund: "Congressional Trading", portfolioSize: 200000000, style: "Growth/Tech", source: "Congressional Disclosure" },
  { id: 4, name: "Michael Burry", fund: "Scion Asset Management", portfolioSize: 300000000, style: "Contrarian/Short", source: "SEC 13F Filing" },
  { id: 5, name: "Cathie Wood", fund: "ARK Invest", portfolioSize: 14000000000, style: "Disruptive Innovation", source: "Daily Trade Disclosure" },
  { id: 6, name: "Steve Cohen", fund: "Point72", portfolioSize: 35000000000, style: "Quantitative/Multi-Strategy", source: "SEC 13F Filing" }
];

var recentTrades = [
  { id: 1, traderId: 1, ticker: "OXY", company: "Occidental Petroleum", action: "BUY", shares: 5000000, price: 58.50, value: 292500000, date: "2026-06-28", portfolioSize: 350000000000, rationale: "Continued accumulation. Now owns 28% of company. Long-term energy thesis." },
  { id: 2, traderId: 5, ticker: "TSLA", company: "Tesla Inc", action: "BUY", shares: 150000, price: 285.00, value: 42750000, date: "2026-07-03", portfolioSize: 14000000000, rationale: "Robotaxi catalyst approaching. AI/autonomy play at scale." },
  { id: 3, traderId: 4, ticker: "NVDA", company: "NVIDIA Corp", action: "SELL", shares: 100000, price: 135.00, value: 13500000, date: "2026-07-01", portfolioSize: 300000000, rationale: "Trimming AI winner. Believes valuation stretched at 40x forward earnings." },
  { id: 4, traderId: 3, ticker: "PANW", company: "Palo Alto Networks", action: "BUY", shares: 10000, price: 320.00, value: 3200000, date: "2026-06-30", portfolioSize: 200000000, rationale: "Cybersecurity spending tailwind. Platform consolidation thesis." },
  { id: 5, traderId: 2, ticker: "GOOGL", company: "Alphabet Inc", action: "BUY", shares: 2000000, price: 185.00, value: 370000000, date: "2026-07-02", portfolioSize: 12000000000, rationale: "AI monetization underappreciated. Search + Cloud + Waymo optionality." },
  { id: 6, traderId: 6, ticker: "META", company: "Meta Platforms", action: "BUY", shares: 500000, price: 510.00, value: 255000000, date: "2026-07-05", portfolioSize: 35000000000, rationale: "Reels monetization + AI assistants driving engagement growth." },
  { id: 7, traderId: 1, ticker: "AAPL", company: "Apple Inc", action: "SELL", shares: 10000000, price: 220.00, value: 2200000000, date: "2026-06-25", portfolioSize: 350000000000, rationale: "Continued trimming of largest position. Tax optimization + rebalancing." },
  { id: 8, traderId: 4, ticker: "GME", company: "GameStop Corp", action: "BUY", shares: 500000, price: 28.00, value: 14000000, date: "2026-07-06", portfolioSize: 300000000, rationale: "Cash-rich balance sheet trading below book value. Contrarian deep value." }
];

var smallStackStrategies = [
  { id: 1, title: "The Coffee Can Portfolio", minBudget: 50, risk: "low",
    description: "Buy and literally forget. Pick 5-10 quality companies, buy fractional shares monthly, never sell for 10+ years.",
    steps: ["Open Fidelity/Schwab account (no minimums)", "Set up $10-50/week auto-invest into VOO (S&P 500 ETF)", "Add individual stocks only after 6 months of consistent saving", "Never check more than once a month"] },
  { id: 2, title: "Whale Watching (Follow the Smart Money)", minBudget: 200, risk: "medium",
    description: "Mirror top fund managers but at your scale. Wait for 13F filings, then buy their highest-conviction new positions.",
    steps: ["Track 13F filings at sec.gov (45 days delayed)", "Focus on NEW positions only (not additions to existing)", "Only mirror trades that are >3% of their portfolio (high conviction)", "Use fractional shares to match their allocation percentage"] },
  { id: 3, title: "The Wheel Strategy (Income on Small Accounts)", minBudget: 500, risk: "medium",
    description: "Sell cash-secured puts on stocks you want to own. If assigned, sell covered calls. Generates 1-3% monthly income.",
    steps: ["Find stocks under $15 you would own (Ford, SOFI, PLTR)", "Sell 1 cash-secured put at a strike you like (need 100x strike in cash)", "If assigned, sell covered calls above your cost basis", "Repeat. Income compounds even in flat markets."] },
  { id: 4, title: "0DTE Scalping (High Risk/High Reward)", minBudget: 100, risk: "high",
    description: "Day-trade 0DTE SPY/QQQ options for quick 20-50% gains. What top traders do with millions, you do with $50-200.",
    steps: ["Only trade first 30 min and last 30 min of market", "Buy ATM calls/puts on SPY based on momentum", "Take profit at 20-30% gain. Hard stop at -50%.", "MAX 1 trade per day. NEVER revenge trade.", "This is gambling with an edge -- never use rent money"] },
  { id: 5, title: "Dividend Snowball", minBudget: 100, risk: "low",
    description: "Build a passive income machine. Buy dividend aristocrats, reinvest all dividends. Snowball grows exponentially over time.",
    steps: ["Start with SCHD or VYM (dividend ETFs) for instant diversification", "Add $25-100/month consistently", "Enable DRIP (dividend reinvestment)", "After $5K, add individual dividend kings (JNJ, KO, PG, O)", "Goal: dividends cover one bill, then two, then all."] }
];

var dataSources = [
  { name: "SEC EDGAR", url: "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany", description: "Quarterly hedge fund holdings (45-day delay)", free: true },
  { name: "Capitol Trades", url: "https://www.capitoltrades.com/trades", description: "Congressional stock trading disclosures", free: true },
  { name: "OpenInsider", url: "http://openinsider.com/screener", description: "SEC Form 4 insider buying/selling", free: true },
  { name: "ARK Invest Daily Trades", url: "https://ark-funds.com/ark-fund-daily-trades/", description: "Cathie Wood daily buy/sell disclosure", free: true },
  { name: "Unusual Whales", url: "https://unusualwhales.com", description: "Options flow and whale alerts", free: false }
];

// ============ STATE ============
var state = {
  budget: 500,
  activeTab: "trades",
  openStrategies: {}
};

// ============ UTILS ============
function escapeHtml(str) {
  var div = document.createElement("div");
  div.textContent = String(str);
  return div.innerHTML;
}

function scaleTrade(trade, userBudget) {
  var traderPortfolio = trade.portfolioSize || 1000000000;
  var tradeAmount = trade.value;
  var percentOfPortfolio = (tradeAmount / traderPortfolio) * 100;
  var yourAmount = (percentOfPortfolio / 100) * userBudget;
  var sharePrice = trade.price || tradeAmount / (trade.shares || 1);
  var yourShares = Math.floor(yourAmount / sharePrice);
  var fractionalShares = (yourAmount / sharePrice).toFixed(4);
  return {
    percentOfPortfolio: percentOfPortfolio.toFixed(2),
    yourAmount: yourAmount.toFixed(2),
    yourShares: yourShares,
    fractionalShares: fractionalShares,
    sharePrice: sharePrice.toFixed(2),
    conviction: percentOfPortfolio > 5 ? "HIGH" : percentOfPortfolio > 2 ? "MEDIUM" : "LOW"
  };
}

function generateStrategy(trade, userBudget) {
  var strategies = [];
  var sharePrice = trade.price || 100;
  if (userBudget < sharePrice) {
    strategies.push({ type: "Fractional Shares", description: "Buy $" + Math.min(userBudget * 0.05, 50).toFixed(0) + " worth via fractional shares on Fidelity/Robinhood", risk: "low" });
  }
  if (userBudget >= 100) {
    strategies.push({ type: "ETF Exposure", description: "If " + trade.ticker + " is in SPY/QQQ, buying the ETF gives diversified exposure to same thesis", risk: "low" });
  }
  if (userBudget >= 500 && trade.action === "BUY") {
    strategies.push({ type: "Poor Man's Covered Call (PMCC)", description: "Buy deep ITM LEAPS call (70+ delta, 1yr out) for ~20% stock cost. Sell weekly calls against it.", risk: "medium" });
  }
  if (userBudget >= 200 && trade.action === "BUY") {
    strategies.push({ type: "Bull Call Spread", description: "Buy ATM call, sell OTM call same expiry. Caps upside but cuts cost 50-70%.", risk: "medium" });
  }
  strategies.push({ type: "Dollar-Cost Average", description: "Split into 4 weekly buys of $" + (Math.min(userBudget * 0.05, 25)).toFixed(0) + " to reduce timing risk", risk: "low" });
  return strategies;
}

function formatMoney(num) {
  if (num >= 1e9) return "$" + (num / 1e9).toFixed(1) + "B";
  if (num >= 1e6) return "$" + (num / 1e6).toFixed(1) + "M";
  if (num >= 1e3) return "$" + (num / 1e3).toFixed(1) + "K";
  return "$" + Number(num).toFixed(2);
}

function findTrader(id) {
  for (var i = 0; i < topTraders.length; i++) {
    if (topTraders[i].id === id) return topTraders[i];
  }
  return null;
}

// ============ RENDER ============
function renderTradeCard(trade) {
  var trader = findTrader(trade.traderId) || { name: "Unknown", fund: "", style: "", source: "" };
  var scaled = scaleTrade(trade, state.budget);
  var strategies = generateStrategy(trade, state.budget);
  var isOpen = !!state.openStrategies[trade.id];
  var convictionClass = scaled.conviction === "HIGH" ? "green" : (scaled.conviction === "MEDIUM" ? "gold" : "");

  var strategiesHtml = "";
  if (isOpen) {
    var items = strategies.map(function (s) {
      return '<div class="strat-item">' +
        '<div class="strat-item-row"><strong style="font-size:0.85rem">' + escapeHtml(s.type) + '</strong>' +
        '<span class="badge-pill risk-' + s.risk + '">' + s.risk + ' risk</span></div>' +
        '<p>' + escapeHtml(s.description) + '</p></div>';
    }).join("");
    strategiesHtml = '<div style="margin-top:12px">' + items + '</div>';
  }

  return (
    '<div class="card">' +
      '<div class="card-header">' +
        '<div>' +
          '<div class="trader-name">' + escapeHtml(trader.name) + '</div>' +
          '<div class="trader-meta">' + escapeHtml(trader.fund) + ' &bull; ' + escapeHtml(trader.style) + ' &bull; ' + escapeHtml(trade.date) + '</div>' +
        '</div>' +
        '<span class="trade-action ' + trade.action.toLowerCase() + '">' + trade.action + '</span>' +
      '</div>' +
      '<div style="font-size:1.2rem;font-weight:700;margin-bottom:4px">' + trade.ticker +
        ' <span style="color:#a0a0b0;font-weight:400;font-size:0.85rem">' + escapeHtml(trade.company) + '</span></div>' +
      '<div class="trade-details">' +
        '<div class="detail-item"><div class="detail-label">Their Trade</div><div class="detail-value">' + formatMoney(trade.value) + '</div></div>' +
        '<div class="detail-item"><div class="detail-label">Share Price</div><div class="detail-value">$' + trade.price + '</div></div>' +
        '<div class="detail-item"><div class="detail-label">% of Portfolio</div><div class="detail-value blue">' + scaled.percentOfPortfolio + '%</div></div>' +
        '<div class="detail-item"><div class="detail-label">Conviction</div><div class="detail-value ' + convictionClass + '">' + scaled.conviction + '</div></div>' +
      '</div>' +
      '<div style="color:#a0a0b0;font-size:0.85rem;font-style:italic;margin-bottom:12px">' + escapeHtml(trade.rationale) + '</div>' +
      '<div class="scaled-section">' +
        '<h4>Scaled to Your $' + state.budget + ' Budget:</h4>' +
        '<div class="scaled-grid">' +
          '<div class="scaled-item"><span>Your Position Size</span><strong style="color:#00d4aa">$' + scaled.yourAmount + '</strong></div>' +
          '<div class="scaled-item"><span>Whole Shares</span><strong>' + scaled.yourShares + '</strong></div>' +
          '<div class="scaled-item"><span>Fractional</span><strong>' + scaled.fractionalShares + ' shares</strong></div>' +
          '<div class="scaled-item"><span>Same % Allocation</span><strong style="color:#4a90d9">' + scaled.percentOfPortfolio + '%</strong></div>' +
        '</div>' +
      '</div>' +
      '<div style="margin-top:12px">' +
        '<button class="strat-toggle-btn" data-toggle-strategy="' + trade.id + '">' +
          (isOpen ? "Hide" : "Show") + ' Small-Budget Strategies (' + strategies.length + ')' +
        '</button>' +
        strategiesHtml +
      '</div>' +
      '<div style="margin-top:8px;font-size:0.7rem;color:#6b6b80">Source: ' + escapeHtml(trader.source) + '</div>' +
    '</div>'
  );
}

function renderStrategyCard(strategy) {
  var stepsHtml = strategy.steps.map(function (s) { return '<li>' + escapeHtml(s) + '</li>'; }).join("");
  var unlocked = state.budget >= strategy.minBudget;
  var unlockedHtml = unlocked ?
    '<div style="margin-top:12px;padding:10px 14px;background:rgba(0,212,170,0.08);border-radius:8px">' +
    '<span style="font-size:0.8rem;color:#00d4aa">With your $' + state.budget + ' budget, you can start this strategy today.</span></div>' : "";

  return (
    '<div class="strategy-card">' +
      '<h3>' + escapeHtml(strategy.title) + '</h3>' +
      '<span class="risk-badge risk-' + strategy.risk + '">' + strategy.risk + ' risk</span>' +
      '<span style="margin-left:8px;font-size:0.75rem;color:#6b6b80">Min: $' + strategy.minBudget + '</span>' +
      '<p>' + escapeHtml(strategy.description) + '</p>' +
      '<ul>' + stepsHtml + '</ul>' +
      unlockedHtml +
    '</div>'
  );
}

function renderDataSources() {
  var rows = dataSources.map(function (source) {
    return (
      '<div class="card source-row">' +
        '<div>' +
          '<div style="font-weight:700">' + escapeHtml(source.name) + '</div>' +
          '<div style="color:#a0a0b0;font-size:0.85rem">' + escapeHtml(source.description) + '</div>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<span class="badge-pill ' + (source.free ? "badge-free" : "badge-paid") + '">' + (source.free ? "FREE" : "PAID") + '</span>' +
          '<a href="' + source.url + '" target="_blank" rel="noopener noreferrer" style="color:#4a90d9;font-size:0.8rem">Visit &rarr;</a>' +
        '</div>' +
      '</div>'
    );
  }).join("");

  return (
    '<div>' +
      '<p class="intro-text">Free and public data sources this app is built around. All trader data comes from legally required public disclosures — no insider info, no paid services needed.</p>' +
      rows +
      '<div class="card" style="margin-top:24px;border-color:#ffd700">' +
        '<h3 style="color:#ffd700;margin-bottom:8px">How This App Gets Data</h3>' +
        '<ul style="padding-left:20px;color:#a0a0b0;font-size:0.85rem">' +
          '<li><strong>SEC 13F Filings</strong> — Every fund managing $100M+ must disclose holdings quarterly. 45-day delay.</li>' +
          '<li><strong>Congressional STOCK Act</strong> — Members of Congress must disclose trades within 45 days.</li>' +
          '<li><strong>SEC Form 4</strong> — Corporate insiders must report trades within 2 business days.</li>' +
          '<li><strong>ARK Invest</strong> — Voluntarily publishes all trades daily via email/website.</li>' +
          '<li><strong>Options Flow</strong> — Large unusual options bets are visible on public exchanges in real-time.</li>' +
        '</ul>' +
      '</div>' +
      '<div class="card" style="margin-top:16px">' +
        '<h3 style="color:#4a90d9;margin-bottom:8px">Current Version</h3>' +
        '<p style="color:#a0a0b0;font-size:0.85rem">This is a standalone demo build with sample trade data illustrating the concept. It runs entirely in your browser — no server, no install, no Node.js, no external scripts required. Just open this HTML file on any device.</p>' +
      '</div>' +
    '</div>'
  );
}

function render() {
  var root = document.getElementById("root");
  var tabs = [
    { id: "trades", label: "Live Trades" },
    { id: "strategies", label: "Small Stack Plays" },
    { id: "sources", label: "Data Sources" }
  ];

  var tabsHtml = tabs.map(function (tab) {
    return '<button class="tab' + (state.activeTab === tab.id ? " active" : "") + '" data-tab="' + tab.id + '">' + tab.label + '</button>';
  }).join("");

  var bodyHtml = "";
  if (state.activeTab === "trades") {
    bodyHtml = '<p class="intro-text">Recent trades from top fund managers, congress members, and notable investors. Each trade is scaled to your ' + formatMoney(state.budget) + ' budget.</p>' +
      recentTrades.map(renderTradeCard).join("");
  } else if (state.activeTab === "strategies") {
    var filtered = smallStackStrategies.filter(function (s) { return state.budget >= s.minBudget; });
    bodyHtml = '<p class="intro-text">Battle-tested strategies for accounts under $5K. Real ways to grow small money using the same principles as billion-dollar funds.</p>' +
      filtered.map(renderStrategyCard).join("");
  } else if (state.activeTab === "sources") {
    bodyHtml = renderDataSources();
  }

  root.innerHTML =
    '<div class="app">' +
      '<header class="header">' +
        '<h1>TradeScale</h1>' +
        '<div class="budget-input">' +
          '<label>My Budget:</label>' +
          '<span style="color:#ffd700;font-size:1.1rem">$</span>' +
          '<input type="number" id="budget-input" value="' + state.budget + '" min="0" step="50" />' +
        '</div>' +
      '</header>' +
      '<div class="tabs">' + tabsHtml + '</div>' +
      '<div id="tab-body">' + bodyHtml + '</div>' +
    '</div>';

  attachEvents();
}

function attachEvents() {
  var budgetInput = document.getElementById("budget-input");
  if (budgetInput) {
    budgetInput.addEventListener("input", function (e) {
      var val = Number(e.target.value);
      state.budget = isNaN(val) ? 0 : val;
      render();
      var el = document.getElementById("budget-input");
      if (el) { el.focus(); el.setSelectionRange(String(state.budget).length, String(state.budget).length); }
    });
  }

  var tabButtons = document.querySelectorAll("[data-tab]");
  for (var i = 0; i < tabButtons.length; i++) {
    tabButtons[i].addEventListener("click", function (e) {
      state.activeTab = e.currentTarget.getAttribute("data-tab");
      render();
    });
  }

  var toggleButtons = document.querySelectorAll("[data-toggle-strategy]");
  for (var j = 0; j < toggleButtons.length; j++) {
    toggleButtons[j].addEventListener("click", function (e) {
      var id = e.currentTarget.getAttribute("data-toggle-strategy");
      state.openStrategies[id] = !state.openStrategies[id];
      render();
    });
  }
}

render();
</script>
</body>
</html>
