name: Refresh Live Trade Data

on:
  schedule:
    # 11:00 UTC daily (~6-7am ET, after ARK posts prior-day trades)
    - cron: "0 11 * * 1-6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch latest ARK trades
        run: python fetch_data.py
      - name: Commit if changed
        run: |
          git config user.name "tradescale-bot"
          git config user.email "actions@github.com"
          if [ -n "$(git status --porcelain data/trades.json)" ]; then
            git add data/trades.json
            git commit -m "chore: refresh live trade data ($(date -u +%Y-%m-%d))"
            git push
            echo "Data updated and pushed."
          else
            echo "No changes in trade data."
          fi
